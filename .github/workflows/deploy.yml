name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /home/TimeGlobal
            git pull origin main
            docker build -t timeglobal .
            docker stop timeglobal && docker rm timeglobal
            docker run -d --name timeglobal -p 3000:80 --restart always timeglobal
